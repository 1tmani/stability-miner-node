<!DOCTYPE html><html><head><meta charset='UTF-8'><title>CORE | STABILITY MINER</title>    <link href='https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>    <style>:root{{--p:#00ff75;--bg:#000;}} body{{background:#000;color:var(--p);font-family:'JetBrains Mono';overflow:hidden;}}     canvas{{position:fixed;inset:0;z-index:1;opacity:0.3;}} .hud{{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:2px;}}     .miner-core{{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;}}     .token-ring{{width:250px;height:250px;border:1px solid var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px var(--p);animation:pulse 2s infinite alternate;}}     @keyframes pulse{{from{{transform:scale(0.9);opacity:0.5;}} to{{transform:scale(1.1);opacity:1;}}}}     .hash-rate{{font-size:24px; font-weight:800; margin-top:20px;}}</style></head>    <body><div class='hud'>NODE: STABILITY_MINER_V89<br>STATUS: MINING_STABILITY_TOKENS<br>UPTIME: <span id='uptime'>0</span>ms</div>    <div class='miner-core'><div class='token-ring'><h1>$SBY</h1></div><div class='hash-rate'><span id='hash'>0</span> TH/s</div><p style='opacity:0.5;margin-top:10px;'>GENERATING NETWORK BACKING</p></div>    <canvas id='c'></canvas><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){{w=canvas.width=innerWidth;h=canvas.height=innerHeight;}}res();    setInterval(()=>{ document.getElementById('uptime').innerText=performance.now().toFixed(0); document.getElementById('hash').innerText=(Math.random()*500+100).toFixed(2); }, 100);    function draw(){{t+=0.05;ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';ctx.lineWidth=1;    for(let i=0;i<20;i++){{ctx.strokeRect(w/2-i*5,h/2-i*5,i*10,i*10);ctx.rotate(0.01);}} requestAnimationFrame(draw);}}draw();</script></body></html>
