<!DOCTYPE html><html><head><meta charset='UTF-8'><title>CORE | OWNER MINER V92.1</title>    <link href='https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;800&family=Orbitron:wght@900&display=swap' rel='stylesheet'>    <style>:root{{--p:#00ff75;--boost:1;}} body{{background:#000;color:var(--p);font-family:'JetBrains Mono';overflow:hidden;}}     canvas{{position:fixed;inset:0;z-index:1;opacity:0.2;}} .hud{{position:fixed;top:40px;left:40px;z-index:100;}}     .owner-auth{{margin-top:15px; border:1px solid var(--p); padding:10px; background:rgba(0,255,117,0.05); width:250px;}}     #auth-input{{background:transparent; border:none; color:#fff; font-family:inherit; outline:none; width:100px; border-bottom:1px solid var(--p);}}     .wallet-hud{{position:fixed; top:40px; right:40px; z-index:100; border-right:2px solid var(--p); padding-right:20px; text-align:right;}}     .coin-count{{font-family:'Orbitron'; font-size:28px; color:#fff; text-shadow: 0 0 20px var(--p);}}     .miner-core{{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;}}     .token-ring{{width:220px;height:220px;border:1px solid var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px var(--p);animation:pulse 2s infinite alternate;}}     @keyframes pulse{{from{{transform:scale(0.95);opacity:0.6;}} to{{transform:scale(1.05);opacity:1;}}}} </style></head>    <body><div class='hud'>NODE: MINER_V92.1_OWNER<br>    <div class='owner-auth'>OWNER_KEY: <input type='text' id='auth-input' placeholder='ENTER_ID' oninput='checkID(this.value)'></div>    STATUS: <span id='v-status'>STANDBY</span></div>    <div class='wallet-hud'><div style='font-size:9px; opacity:0.6;'>SYNAPTIC_VAULT</div><div class='coin-count' id='coins'>0.0000</div><div style='font-size:10px;'>$SBY TOTAL</div></div>    <div class='miner-core'><div class='token-ring'><h1>$SBY</h1></div><div style='margin-top:20px;font-size:24px;font-weight:800;'><span id='hash'>0</span> TH/s</div><p id='boost-msg' style='opacity:0.5;margin-top:10px;'>STANDARD_MINING_PROTOCOL</p></div>    <canvas id='c'></canvas><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0, coins=0, boost=1; function res(){{w=canvas.width=innerWidth;h=canvas.height=innerHeight;}}res();    function checkID(val){{ if(val.toUpperCase()==='0X-99'){{ boost=2.5; document.getElementById('v-status').innerText='OWNER_VERIFIED'; document.getElementById('boost-msg').innerText='OWNER_PERK: 2.5x_BOOST_ACTIVE'; document.documentElement.style.setProperty('--p','#00f2ff'); }} else {{ boost=1; document.getElementById('v-status').innerText='STANDBY'; }} }}    setInterval(()=>{         let currentHash = (Math.random()*500+100) * boost;         document.getElementById('hash').innerText=currentHash.toFixed(2);         coins += (currentHash / 50000);         document.getElementById('coins').innerText = coins.toFixed(4);     }, 100);    function draw(){{t+=0.05;ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';    for(let i=0;i<15;i++){{ctx.strokeRect(w/2-i*8,h/2-i*8,i*16,i*16);ctx.rotate(0.005);}} requestAnimationFrame(draw);}}draw();</script></body></html>
